<!DOCTYPE html>
<html>
<head><title>Spotify Login</title></head>
<body>
<p>Completing login...</p>
<script>
(async function() {
  try {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');

    if (error || !code) {
      window.opener.postMessage(
        { type: 'spotify-auth-callback', error: error || 'No authorization code received' },
        window.location.origin
      );
      window.close();
      return;
    }

    const codeVerifier = sessionStorage.getItem('spotify_code_verifier');
    if (!codeVerifier) {
      window.opener.postMessage(
        { type: 'spotify-auth-callback', error: 'Missing PKCE verifier' },
        window.location.origin
      );
      window.close();
      return;
    }

    // Read client ID from the meta tag or hardcode via build step
    // Since this is a static file, we read it from sessionStorage set by the opener
    const clientId = sessionStorage.getItem('spotify_client_id');
    if (!clientId) {
      window.opener.postMessage(
        { type: 'spotify-auth-callback', error: 'Missing client ID' },
        window.location.origin
      );
      window.close();
      return;
    }

    const redirectUri = window.location.origin + '/callback.html';

    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id: clientId,
        grant_type: 'authorization_code',
        code: code,
        redirect_uri: redirectUri,
        code_verifier: codeVerifier,
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(function() { return {}; });
      throw new Error(err.error_description || 'Token exchange failed');
    }

    const data = await res.json();
    sessionStorage.removeItem('spotify_code_verifier');
    sessionStorage.setItem('spotify_refresh_token', data.refresh_token);

    window.opener.postMessage({
      type: 'spotify-auth-callback',
      accessToken: data.access_token,
      refreshToken: data.refresh_token,
      expiresIn: data.expires_in,
    }, window.location.origin);

    window.close();
  } catch (err) {
    window.opener.postMessage(
      { type: 'spotify-auth-callback', error: err.message || 'Authentication failed' },
      window.location.origin
    );
    window.close();
  }
})();
</script>
</body>
</html>
